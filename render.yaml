services:
  - type: web
    name: backend
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scorient-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEV_AUTH_ENABLED
        value: false
      - key: CORS_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: noreply@scorient.app

  - type: web
    name: frontend
    runtime: static
    rootDir: frontend
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_DEV_AUTH
        value: false

databases:
  - name: scorient-db
    plan: basic-1gb
